repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: Ruff Lint
        entry: uv run ruff check --fix .
        language: system
        pass_filenames: false
        types: [python]

      - id: ruff-format
        name: Ruff Format
        entry: uv run ruff format .
        language: system
        pass_filenames: false
        types: [python]

      - id: unit-tests
        name: Unit Tests
        entry: uv run pytest tests/unit/ -x -q
        language: system
        pass_filenames: false
        stages: [pre-push]
